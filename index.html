<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I'm Sorry 💔</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>I'm Really Sorry 💔</h1>

    <p class="message">
      Hey love,  
      I know I hurt you and I feel really bad about it.  
      You mean so much to me, and I never want to lose your smile.  
      Please forgive me. I promise to do better. ❤️
    </p>

    <button onclick="showHearts()">Forgive Me? 💖</button>

    <div id="hearts"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
